<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Operator UI - PoC</title>
    <link rel="stylesheet" href="./css/styles.css">
  </head>
  <body>
    <div class="app-header">
      <h1>Operator Panel (PoC)</h1>
      <p>Modo local (autenticação desativada)</p>
    </div>

    <div class="split-container">
      <div class="pane left-pane">
        <div class="preview-controls">
          <input id="left-url-input" type="url" placeholder="https://example.com" />
          <button id="left-fetch-btn" type="button">Explorar página</button>
        </div>
        <iframe id="preview" src="about:blank" title="preview"></iframe>
      </div>

      <div class="divider" id="divider" role="separator" aria-orientation="vertical" tabindex="0"></div>

      <div class="pane right-pane">
        <h2>Interventions</h2>
        <form id="intervention-form">
          <div>
            <label>URL: <input id="url" name="url" type="url" required placeholder="https://example.com"></label>
          </div>
          <div>
            <label>Selector: <input id="selector" name="selector" type="text" required placeholder=".article .title"></label>
          </div>
          <div>
            <label>Regras (JSON/text):</label><br />
            <textarea id="regras" name="regras" rows="6" cols="60" placeholder='{"field":"css selector"}'></textarea>
          </div>
          <div>
            <button type="submit">Criar intervenção</button>
          </div>
        </form>

        <ul id="list"></ul>
      </div>
    </div>

    <script>
      // Força a base da API para o mesmo host/origem da UI (útil ao servir via túnel)
      try {
        window.__API_BASE = location.origin + '/api'
        console.debug('index.html: set window.__API_BASE ->', window.__API_BASE)
      } catch (e) { console.debug('index.html: could not set window.__API_BASE', e) }
    </script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
